<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Migraine Log</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0c0c11;--surface:#161620;--surface2:#1e1e2c;--surface3:#282838;
    --text:#ededf4;--text2:#9a9ab0;--text3:#6a6a80;
    --accent:#7c5cfc;--accent2:#9b7dff;--accent-dim:#7c5cfc22;--accent-glow:#7c5cfc44;
    --red:#ff4d6a;--orange:#ff8c42;--yellow:#ffd166;--green:#06d6a0;--blue:#4ea8de;
    --radius:16px;--radius-sm:12px;
    --shadow:0 2px 16px rgba(0,0,0,.4);
    --transition:0.2s ease;
  }
  html{font-size:16px;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;padding-bottom:84px}
  button{font:inherit;border:none;cursor:pointer;background:none;color:inherit}
  input,textarea,select{font:inherit;border:none;background:var(--surface2);color:var(--text);border-radius:var(--radius-sm);padding:12px 16px;width:100%;outline:none;transition:box-shadow var(--transition)}
  input:focus,textarea:focus,select:focus{box-shadow:0 0 0 2px var(--accent),0 0 12px var(--accent-dim)}
  textarea{resize:vertical;min-height:60px}

  /* ---- NAV ---- */
  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.05);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
  .nav button{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text3);transition:color var(--transition),transform var(--transition)}
  .nav button.active{color:var(--accent2)}
  .nav button.active svg{filter:drop-shadow(0 0 6px var(--accent-glow))}
  .nav button svg{width:22px;height:22px;transition:filter var(--transition)}

  /* ---- VIEWS ---- */
  .view{display:none;padding:16px;max-width:500px;margin:0 auto;animation:fadeIn .3s ease}
  .view.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* ---- HEADER ---- */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:12px}
  .header h1{font-size:24px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header .subtitle{font-size:13px;color:var(--text2);margin-top:2px}

  /* ---- LOG BUTTON (HOME) ---- */
  .log-btn{width:100%;padding:20px;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),#9b5de5);color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 24px rgba(124,92,252,.3),inset 0 1px 0 rgba(255,255,255,.15);transition:transform .15s,box-shadow .15s;margin-bottom:20px}
  .log-btn:active{transform:scale(.97);box-shadow:0 2px 12px rgba(124,92,252,.2)}
  .log-btn svg{width:24px;height:24px}

  /* ---- CARDS ---- */
  .card{background:var(--surface);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}

  /* ---- STAT ROW ---- */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .stat{background:var(--surface);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);padding:16px 10px;text-align:center;box-shadow:var(--shadow)}
  .stat .val{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .stat .label{font-size:10px;font-weight:600;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.3px}

  /* ---- FORM ---- */
  .form-group{margin-bottom:18px}
  .form-label{font-size:12px;font-weight:700;color:var(--text3);margin-bottom:8px;display:block;text-transform:uppercase;letter-spacing:.5px}
  .form-row{display:flex;gap:10px}
  .form-row>*{flex:1}

  /* severity */
  .severity-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .sev-btn{aspect-ratio:1;border-radius:var(--radius-sm);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;background:var(--surface2);transition:all var(--transition);min-height:48px;border:2px solid transparent}
  .sev-btn.selected{color:#fff;transform:scale(1.08);border-color:rgba(255,255,255,.2)}

  /* triggers */
  .trigger-grid{display:flex;flex-wrap:wrap;gap:8px}
  .trigger-btn{padding:10px 16px;border-radius:20px;background:var(--surface2);font-size:13px;font-weight:500;transition:all var(--transition);white-space:nowrap;border:1px solid transparent}
  .trigger-btn.selected{background:var(--accent);color:#fff;border-color:rgba(255,255,255,.15);box-shadow:0 2px 8px rgba(124,92,252,.3)}

  /* toggle */
  .toggle-row{display:flex;align-items:center;gap:12px}
  .toggle{width:52px;height:30px;border-radius:15px;background:var(--surface3);position:relative;transition:background var(--transition);flex-shrink:0;cursor:pointer}
  .toggle.on{background:var(--accent)}
  .toggle::after{content:'';position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform var(--transition);box-shadow:0 2px 4px rgba(0,0,0,.3)}
  .toggle.on::after{transform:translateX(22px)}

  /* duration presets */
  .dur-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .dur-btn{padding:12px 8px;border-radius:var(--radius-sm);background:var(--surface2);font-size:13px;font-weight:600;text-align:center;transition:all var(--transition);border:1px solid transparent}
  .dur-btn.selected{background:var(--accent);color:#fff;border-color:rgba(255,255,255,.15)}
  .multiday-input{display:none;margin-top:10px}
  .multiday-input.visible{display:flex;gap:10px;align-items:center}
  .multiday-input label{font-size:13px;color:var(--text2);white-space:nowrap}
  .multiday-input input{max-width:80px;text-align:center}

  /* submit */
  .submit-btn{width:100%;padding:18px;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),#9b5de5);color:#fff;font-size:17px;font-weight:700;margin-top:8px;transition:opacity var(--transition);box-shadow:0 4px 16px rgba(124,92,252,.25)}
  .submit-btn:active{opacity:.85}

  /* ---- CALENDAR HEATMAP ---- */
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .cal-header button{width:36px;height:36px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;transition:background var(--transition)}
  .cal-header button:active{background:var(--surface3)}
  .cal-header span{font-size:15px;font-weight:700}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
  .cal-day-label{font-size:10px;color:var(--text3);padding:4px 0;font-weight:600}
  .cal-cell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);position:relative;background:var(--surface2);transition:transform var(--transition)}
  .cal-cell.empty{background:transparent}
  .cal-cell.today{box-shadow:inset 0 0 0 2px var(--accent)}
  .cal-cell.has-entry{color:#fff;font-weight:600}
  .cal-cell.sev-low{background:rgba(78,168,222,.25);box-shadow:inset 0 0 0 1.5px rgba(78,168,222,.5)}
  .cal-cell.sev-med{background:rgba(255,209,102,.3);box-shadow:inset 0 0 0 1.5px rgba(255,209,102,.6)}
  .cal-cell.sev-high{background:rgba(255,140,66,.4);box-shadow:inset 0 0 0 1.5px rgba(255,140,66,.7)}
  .cal-cell.sev-severe{background:rgba(255,77,106,.45);box-shadow:inset 0 0 0 2px rgba(255,77,106,.8),0 0 8px rgba(255,77,106,.3)}
  .cal-cell .sev-dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%}
  .cal-cell .multi-dot{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);display:flex;gap:2px}
  .cal-cell .multi-dot span{width:4px;height:4px;border-radius:50%}
  .cal-legend{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;font-size:10px;color:var(--text3)}
  .cal-legend-item{display:flex;align-items:center;gap:4px}
  .cal-legend-swatch{width:10px;height:10px;border-radius:3px}

  /* ---- LONG-TERM TREND CARDS ---- */
  .trend-tabs{display:flex;gap:6px;margin-bottom:12px}
  .trend-tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--surface2);color:var(--text3);transition:all var(--transition)}
  .trend-tab.active{background:var(--accent);color:#fff}
  .sparkline-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--surface2)}
  .sparkline-row:last-child{border-bottom:none}
  .sparkline-label{font-size:12px;color:var(--text2);width:50px;flex-shrink:0}
  .sparkline-bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
  .sparkline-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
  .sparkline-val{font-size:12px;font-weight:700;color:var(--text);width:28px;text-align:right}
  .severity-line-chart{width:100%;height:160px;position:relative}
  .severity-line-chart canvas{width:100%!important;height:100%!important}
  .year-heatmap{display:grid;grid-template-columns:repeat(53,1fr);gap:2px}
  .year-heatmap-cell{aspect-ratio:1;border-radius:2px;background:var(--surface2)}
  .year-heatmap-months{display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--text3)}
  .trend-summary{display:flex;gap:10px;margin-bottom:14px}
  .trend-stat{flex:1;text-align:center;padding:10px;background:var(--surface2);border-radius:var(--radius-sm)}
  .trend-stat .val{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .trend-stat .label{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
  .trend-delta{font-size:10px;font-weight:600;margin-left:4px}
  .trend-delta.up{color:var(--red)}
  .trend-delta.down{color:var(--green)}
  .trend-delta.flat{color:var(--text3)}

  /* ---- SORT MODE ---- */
  .sort-toggle{width:32px;height:32px;border-radius:var(--radius-sm);background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all var(--transition)}
  .sort-toggle.active{background:var(--accent);color:#fff}
  .dash-card-wrap{position:relative;transition:transform .25s ease,opacity .25s ease}
  .drag-handle{display:none;position:absolute;top:10px;right:10px;z-index:10;width:28px;height:28px;border-radius:8px;background:var(--surface3);color:var(--text3);align-items:center;justify-content:center;cursor:grab;touch-action:none;transition:all var(--transition)}
  .drag-handle:active{cursor:grabbing;background:var(--accent);color:#fff}
  .sort-mode .drag-handle{display:flex}
  .sort-mode .dash-card-wrap{border:2px dashed rgba(124,92,252,.25);border-radius:var(--radius);padding:2px;margin-bottom:4px}
  .dash-card-wrap.dragging{opacity:.5;transform:scale(.97)}
  .dash-card-wrap.drag-over{border-color:var(--accent);background:var(--accent-dim)}

  /* ---- TIMELINE ---- */
  .timeline-item{background:var(--surface);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:background var(--transition),border-color var(--transition)}
  .timeline-item:active{background:var(--surface2)}
  .timeline-item.expanded{border-color:rgba(124,92,252,.2)}
  .tl-sev{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .tl-info{flex:1;min-width:0}
  .tl-date{font-size:13px;color:var(--text2);font-weight:500}
  .tl-triggers{font-size:12px;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tl-expanded{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--surface3);font-size:13px;color:var(--text2);line-height:1.6}
  .timeline-item.expanded .tl-expanded{display:block}
  .tl-actions{display:flex;gap:8px;margin-top:12px}
  .tl-actions button{padding:10px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;transition:opacity var(--transition)}
  .tl-actions button:active{opacity:.7}
  .tl-edit{background:var(--surface3);color:var(--text)}
  .tl-del{background:rgba(255,77,106,.12);color:var(--red)}

  /* ---- CHART ---- */
  .chart-wrap{height:140px;position:relative;margin-top:8px}
  .chart-bars{display:flex;align-items:flex-end;gap:4px;height:120px;padding-bottom:20px;position:relative}
  .chart-bar{flex:1;border-radius:4px 4px 0 0;background:linear-gradient(to top,var(--accent),var(--accent2));min-width:0;transition:height .3s ease;position:relative}
  .chart-bar:hover::after{content:attr(data-val);position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text2);white-space:nowrap}
  .chart-labels{display:flex;gap:4px;position:absolute;bottom:0;left:0;right:0}
  .chart-labels span{flex:1;text-align:center;font-size:9px;color:var(--text3)}

  /* ---- MED INVENTORY ---- */
  .med-item{background:var(--surface);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .med-icon{width:42px;height:42px;border-radius:12px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center}
  .med-info{flex:1;min-width:0}
  .med-name{font-weight:700;font-size:15px}
  .med-detail{font-size:12px;color:var(--text3);margin-top:2px}
  .med-qty{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .med-expired{color:var(--red)!important;-webkit-text-fill-color:var(--red)!important}
  .med-actions{display:flex;gap:6px}
  .med-actions button{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;transition:background var(--transition)}
  .med-actions button:active{background:var(--surface3)}

  /* ---- MODAL ---- */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
  .modal-overlay.active{display:flex}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:500px;max-height:85dvh;overflow-y:auto;animation:slideUp .3s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
  .modal-handle{width:36px;height:4px;border-radius:2px;background:var(--surface3);margin:0 auto 18px}
  .modal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .modal-top h2{font-size:18px;font-weight:800;margin:0}
  .modal-close{width:34px;height:34px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text2);flex-shrink:0;transition:background var(--transition)}
  .modal-close:active{background:var(--surface3)}

  /* ---- CONFIRM MODAL ---- */
  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:250;display:none;align-items:center;justify-content:center;animation:fadeIn .2s}
  .confirm-overlay.active{display:flex}
  .confirm-box{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:28px 24px;width:90%;max-width:340px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5)}
  .confirm-box p{font-size:16px;font-weight:600;margin-bottom:20px;color:var(--text)}
  .confirm-btns{display:flex;gap:10px}
  .confirm-btns button{flex:1;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;transition:opacity var(--transition)}
  .confirm-btns button:active{opacity:.7}
  .confirm-cancel{background:var(--surface2);color:var(--text)}
  .confirm-ok{background:var(--red);color:#fff;box-shadow:0 2px 8px rgba(255,77,106,.3)}

  /* ---- TRIGGER BAR (dashboard) ---- */
  .trigger-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .trigger-bar-label{width:90px;font-size:13px;color:var(--text2);font-weight:500}
  .trigger-bar-track{flex:1;height:26px;background:var(--surface2);border-radius:8px;overflow:hidden}
  .trigger-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:700;color:#fff;min-width:28px}

  /* ---- EXPORT/IMPORT ---- */
  .data-actions{display:flex;gap:8px}
  .data-actions button{flex:1;padding:12px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;background:var(--surface2);color:var(--text);transition:background var(--transition)}
  .data-actions button:active{background:var(--surface3)}

  /* ---- TOAST ---- */
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--green);color:#000;padding:12px 24px;border-radius:var(--radius-sm);font-weight:700;font-size:14px;z-index:300;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:0 4px 16px rgba(6,214,160,.3)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* scrollbar */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}

  .empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
  .empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.3}
  .empty-state p{font-size:14px;line-height:1.6}

  /* FAB for meds */
  .fab{position:fixed;bottom:94px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#9b5de5);color:#fff;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(124,92,252,.4);z-index:90;font-size:28px;transition:transform var(--transition)}
  .fab.visible{display:flex}
  .fab:active{transform:scale(.9)}

  /* section divider */
  .section-gap{height:6px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- HOME VIEW -->
<div class="view active" id="view-home">
  <div class="header">
    <div>
      <h1>Migraine Log</h1>
      <div class="subtitle" id="home-subtitle">Track &amp; understand your migraines</div>
    </div>
  </div>
  <button class="log-btn" onclick="showLogForm()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Log Migraine
  </button>
  <div class="stats" id="home-stats"></div>
  <div class="card" id="home-recent">
    <div class="card-title">Recent Entries</div>
    <div id="home-timeline"></div>
  </div>
  <div class="card">
    <div class="card-title">Data</div>
    <div class="data-actions">
      <button onclick="exportData()">Export JSON</button>
      <button onclick="document.getElementById('import-file').click()">Import JSON</button>
      <button onclick="document.getElementById('import-spreadsheet').click()">Import CSV/Excel</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <input type="file" id="import-spreadsheet" accept=".csv,.xlsx,.xls" style="display:none" onchange="importSpreadsheet(event)">
  </div>
</div>

<!-- DASHBOARD VIEW -->
<div class="view" id="view-dashboard">
  <div class="header"><div><h1>Dashboard</h1></div><div style="display:flex;align-items:center;gap:10px"><button class="sort-toggle" id="sort-toggle" onclick="toggleSortMode()" title="Reorder cards"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/><line x1="9" y1="3" x2="9" y2="9"/><line x1="6" y1="6" x2="12" y2="6"/></svg></button><span id="app-version" style="font-size:11px;color:var(--text3);opacity:.7"></span></div></div>
  <div id="dash-sortable">
    <div class="dash-card-wrap" data-card-id="calendar">

<script>
// ---- DATA ----
const TRIGGERS = ['Weather','Stress','Sleep','Food','Hormones','Screen Time','Dehydration','Alcohol','Caffeine'];
const DURATIONS = ['30min','1hr','2hrs','4hrs','8hrs','12hrs','All day','Multi-day'];
const APP_VERSION = '1.4.0';
const SEV_COLORS = [
  '#4ea8de','#4ea8de','#06d6a0','#06d6a0','#ffd166','#ffd166','#ff8c42','#ff8c42','#ff4d6a','#ff4d6a'
];

let entries = JSON.parse(localStorage.getItem('migraine-entries') || '[]');
let meds = JSON.parse(localStorage.getItem('migraine-meds') || '[]');
let calDate = new Date();
let selectedSev = 5;
let selectedDur = '';
let selectedTriggers = new Set();
let medTaken = false;

// ---- INIT ----
function init() {
  buildSevGrid();
  buildDurGrid();
  buildTriggerGrid();
  document.getElementById('app-version').textContent = 'v' + APP_VERSION;
  switchView('home');
}

// ---- NAVIGATION ----
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  document.getElementById('meds-fab').classList.toggle('visible', name === 'meds');
  if (name === 'home') renderHome();
  if (name === 'dashboard') renderDashboard();
  if (name === 'history') renderHistory();
  if (name === 'meds') renderMeds();
}

// ---- SEVERITY GRID ----
function buildSevGrid() {
  const g = document.getElementById('sev-grid');
  g.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'sev-btn' + (i === selectedSev ? ' selected' : '');
    b.textContent = i;
    b.style.background = i === selectedSev ? SEV_COLORS[i-1] : '';
    b.onclick = () => {
      selectedSev = i;
      g.querySelectorAll('.sev-btn').forEach((btn, idx) => {
        btn.classList.toggle('selected', idx + 1 === i);
        btn.style.background = idx + 1 === i ? SEV_COLORS[idx] : '';
      });
    };
    g.appendChild(b);
  }
}

// ---- DURATION GRID ----
function buildDurGrid() {
  const g = document.getElementById('dur-grid');
  g.innerHTML = '';
  DURATIONS.forEach(d => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'dur-btn' + (d === selectedDur ? ' selected' : '');
    b.textContent = d;
    b.onclick = () => {
      selectedDur = selectedDur === d ? '' : d;
      document.getElementById('log-dur-custom').value = '';
      g.querySelectorAll('.dur-btn').forEach(btn => btn.classList.toggle('selected', btn.textContent === selectedDur));
      updateMultidayVisibility();
    };
    g.appendChild(b);
  });
}

function updateMultidayVisibility() {
  const el = document.getElementById('multiday-input');
  el.classList.toggle('visible', selectedDur === 'Multi-day');
  if (selectedDur !== 'Multi-day') {
    document.getElementById('log-multiday-count').value = '';
  }
}

// ---- TRIGGER GRID ----
function buildTriggerGrid() {
  const g = document.getElementById('trigger-grid');
  g.innerHTML = '';
  TRIGGERS.forEach(t => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'trigger-btn' + (selectedTriggers.has(t) ? ' selected' : '');
    b.textContent = t;
    b.onclick = () => {
      selectedTriggers.has(t) ? selectedTriggers.delete(t) : selectedTriggers.add(t);
      b.classList.toggle('selected');
    };
    g.appendChild(b);
  });
}

// ---- LOG FORM ----
function showLogForm(editEntry) {
  const now = new Date();
  const modal = document.getElementById('log-modal');
  document.getElementById('edit-id').value = editEntry ? editEntry.id : '';
  document.getElementById('log-modal-title').textContent = editEntry ? 'Edit Entry' : 'Log Migraine';
  document.getElementById('log-submit-btn').textContent = editEntry ? 'Update Entry' : 'Save Entry';
  document.getElementById('log-date').value = editEntry ? editEntry.date : now.toISOString().split('T')[0];
  document.getElementById('log-time').value = editEntry ? editEntry.time : now.toTimeString().slice(0,5);
  selectedSev = editEntry ? editEntry.severity : 5;
  // Parse multi-day duration back
  if (editEntry && editEntry.duration && editEntry.duration.match(/^\d+ days?$/)) {
    selectedDur = 'Multi-day';
    document.getElementById('log-multiday-count').value = parseInt(editEntry.duration);
  } else {
    selectedDur = editEntry ? editEntry.duration : '';
    document.getElementById('log-multiday-count').value = '';
  }
  selectedTriggers = new Set(editEntry ? editEntry.triggers : []);
  medTaken = editEntry ? editEntry.medTaken : false;
  document.getElementById('med-toggle').classList.toggle('on', medTaken);
  document.getElementById('med-toggle-label').textContent = medTaken ? 'Taken' : 'None taken';
  document.getElementById('med-fields').style.display = medTaken ? 'block' : 'none';
  document.getElementById('log-med-name').value = editEntry ? (editEntry.medName || '') : '';
  document.getElementById('log-med-dose').value = editEntry ? (editEntry.medDose || '') : '';
  document.getElementById('log-weather').value = editEntry ? (editEntry.weather || '') : '';
  document.getElementById('log-notes').value = editEntry ? (editEntry.notes || '') : '';
  document.getElementById('log-dur-custom').value = editEntry && !DURATIONS.includes(editEntry.duration) && !(editEntry.duration && editEntry.duration.match(/^\d+ days?$/)) ? editEntry.duration : '';
  buildSevGrid();
  buildDurGrid();
  buildTriggerGrid();
  updateMultidayVisibility();
  modal.classList.add('active');
}

function closeLogModal() { document.getElementById('log-modal').classList.remove('active'); }

function toggleMed() {
  medTaken = !medTaken;
  document.getElementById('med-toggle').classList.toggle('on', medTaken);
  document.getElementById('med-toggle-label').textContent = medTaken ? 'Taken' : 'None taken';
  document.getElementById('med-fields').style.display = medTaken ? 'block' : 'none';
}

function saveEntry(e) {
  e.preventDefault();
  const dateVal = document.getElementById('log-date').value;
  const timeVal = document.getElementById('log-time').value;
  if (!dateVal) { toast('Please select a date'); return; }
  if (!timeVal) { toast('Please select a time'); return; }
  const editId = document.getElementById('edit-id').value;
  const customDur = document.getElementById('log-dur-custom').value.trim();
  // Build duration string
  let duration = customDur || selectedDur || '';
  if (selectedDur === 'Multi-day') {
    const dayCount = parseInt(document.getElementById('log-multiday-count').value) || 0;
    if (dayCount < 2) { toast('Enter number of days (2+)'); return; }
    duration = dayCount + ' days';
  }
  const entry = {
    id: editId || crypto.randomUUID(),
    date: dateVal,
    time: timeVal,
    severity: selectedSev,
    duration,
    triggers: [...selectedTriggers],
    weather: document.getElementById('log-weather').value.trim(),
    medTaken,
    medName: document.getElementById('log-med-name').value.trim(),
    medDose: document.getElementById('log-med-dose').value.trim(),
    notes: document.getElementById('log-notes').value.trim(),
    createdAt: editId ? (entries.find(x => x.id === editId)?.createdAt || Date.now()) : Date.now()
  };
  if (editId) {
    const idx = entries.findIndex(x => x.id === editId);
    if (idx >= 0) entries[idx] = entry;
  } else {
    entries.unshift(entry);
  }
  persist();
  closeLogModal();
  toast(editId ? 'Entry updated' : 'Migraine logged');
  switchView(document.querySelector('.nav button.active').dataset.view);
}

function deleteEntry(id) {
  entries = entries.filter(x => x.id !== id);
  persist();
  switchView(document.querySelector('.nav button.active').dataset.view);
  toast('Entry deleted');
}

// ---- HOME ----
function renderHome() {
  const now = new Date();
  const month = now.getMonth(), year = now.getFullYear();
  const thisMonth = entries.filter(e => { const d = new Date(e.date); return d.getMonth() === month && d.getFullYear() === year; });
  const avgSev = thisMonth.length ? (thisMonth.reduce((s,e) => s + e.severity, 0) / thisMonth.length).toFixed(1) : '—';
  const streak = getStreakDays();
  document.getElementById('home-stats').innerHTML = `
    <div class="stat"><div class="val">${thisMonth.length}</div><div class="label">This Month</div></div>
    <div class="stat"><div class="val">${avgSev}</div><div class="label">Avg Severity</div></div>
    <div class="stat"><div class="val">${streak}</div><div class="label">Days Clear</div></div>
  `;
  const recent = entries.slice(0, 5);
  document.getElementById('home-timeline').innerHTML = recent.length
    ? recent.map(e => timelineItem(e, true)).join('')
    : '<div class="empty-state"><p>No entries yet.<br>Tap the button above to log your first migraine.</p></div>';
  document.getElementById('home-subtitle').textContent = thisMonth.length === 0
    ? 'No migraines logged this month'
    : `${thisMonth.length} migraine${thisMonth.length > 1 ? 's' : ''} this month`;
}

function getStreakDays() {
  if (!entries.length) return '—';
  const today = new Date(); today.setHours(0,0,0,0);
  const dates = new Set(entries.map(e => e.date));
  let d = new Date(today), count = 0;
  while (true) {
    const ds = d.toISOString().split('T')[0];
    if (dates.has(ds)) break;
    count++;
    d.setDate(d.getDate() - 1);
    if (count > 365) break;
  }
  return count;
}

// ---- DASHBOARD ----
function renderDashboard() {
  restoreCardOrder();
  renderCalendar();
  renderDashStats();
  renderTriggers();
  renderChart();
  renderSeverityTrend();
  renderYearHeatmap();
  renderMonthlyBreakdown();
}

function changeMonth(dir) {
  calDate.setMonth(calDate.getMonth() + dir);
  renderCalendar();
  renderDashStats();
  renderTriggers();
}

function renderCalendar() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const today = new Date();
  const monthEntries = {};
  entries.forEach(e => {
    const d = new Date(e.date);
    if (d.getMonth() === m && d.getFullYear() === y) {
      const day = d.getDate();
      if (!monthEntries[day]) monthEntries[day] = [];
      monthEntries[day].push(e);
    }
  });
  document.getElementById('cal-month').textContent = new Date(y, m).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const labels = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => `<div class="cal-day-label">${d}</div>`).join('');
  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += '<div class="cal-cell empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
    const dayEntries = monthEntries[d];
    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    let dots = '';
    if (dayEntries) {
      cls += ' has-entry';
      const maxSev = Math.max(...dayEntries.map(e => e.severity));
      if (maxSev <= 3) cls += ' sev-low';
      else if (maxSev <= 6) cls += ' sev-med';
      else if (maxSev <= 8) cls += ' sev-high';
      else cls += ' sev-severe';
      if (dayEntries.length > 1) {
        dots = `<div class="multi-dot">${dayEntries.slice(0, 3).map(e => `<span style="background:${SEV_COLORS[e.severity-1]}"></span>`).join('')}</div>`;
      } else {
        dots = `<div class="sev-dot" style="background:${SEV_COLORS[maxSev-1]}"></div>`;
      }
    }
    const title = dayEntries ? dayEntries.length + ' entry(s), max severity ' + Math.max(...dayEntries.map(e => e.severity)) : '';
    cells += `<div class="${cls}" title="${title}">${d}${dots}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = labels + cells;
}

function renderTriggers() {

let trendRange = '12w';
function setTrendRange(range) {
  trendRange = range;
  document.querySelectorAll('.trend-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.trend-tab[onclick="setTrendRange('${range}')"]`).classList.add('active');
  renderChart();
}

function renderChart() {
  const buckets = [];
  const now = new Date();
  if (trendRange === '12w') {
    for (let i = 11; i >= 0; i--) {
      const weekEnd = new Date(now); weekEnd.setDate(weekEnd.getDate() - i * 7);
      const weekStart = new Date(weekEnd); weekStart.setDate(weekStart.getDate() - 6);
      const count = entries.filter(e => { const d = new Date(e.date); return d >= weekStart && d <= weekEnd; }).length;
      buckets.push({ label: `W${12-i}`, count });
    }
  } else if (trendRange === '6m') {
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const mEnd = new Date(d.getFullYear(), d.getMonth() + 1, 0);
      const count = entries.filter(e => { const ed = new Date(e.date); return ed.getMonth() === d.getMonth() && ed.getFullYear() === d.getFullYear(); }).length;
      buckets.push({ label: d.toLocaleDateString('en-US', { month: 'short' }), count });
    }
  } else {
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const count = entries.filter(e => { const ed = new Date(e.date); return ed.getMonth() === d.getMonth() && ed.getFullYear() === d.getFullYear(); }).length;
      const lbl = d.toLocaleDateString('en-US', { month: 'narrow' });
      buckets.push({ label: lbl, count });
    }
  }
  const max = Math.max(...buckets.map(w => w.count), 1);
  document.getElementById('chart-bars').innerHTML = buckets.map(w => {
    const pct = Math.max((w.count / max) * 100, 4);
    const color = w.count === 0 ? 'var(--surface3)' : '';
    return `<div class="chart-bar" data-val="${w.count}" style="height:${pct}%;${color ? 'background:'+color : ''}"></div>`;
  }).join('');
  document.getElementById('chart-labels').innerHTML = buckets.map(w => `<span>${w.label}</span>`).join('');
}

function renderSeverityTrend() {
  const canvas = document.getElementById('sev-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  ctx.clearRect(0, 0, W, H);

  // Build monthly avg severity for last 12 months
  const now = new Date();
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const me = entries.filter(e => { const ed = new Date(e.date); return ed.getMonth() === d.getMonth() && ed.getFullYear() === d.getFullYear(); });
    const avg = me.length ? me.reduce((s, e) => s + e.severity, 0) / me.length : 0;
    months.push({ label: d.toLocaleDateString('en-US', { month: 'short' }), avg, count: me.length });
  }

  // Summary stats
  const recent3 = months.slice(-3).filter(m => m.count > 0);
  const prev3 = months.slice(-6, -3).filter(m => m.count > 0);
  const recentAvg = recent3.length ? (recent3.reduce((s, m) => s + m.avg, 0) / recent3.length).toFixed(1) : '—';
  const prevAvg = prev3.length ? (prev3.reduce((s, m) => s + m.avg, 0) / prev3.length).toFixed(1) : '—';
  const recentTotal = months.slice(-3).reduce((s, m) => s + m.count, 0);
  const prevTotal = months.slice(-6, -3).reduce((s, m) => s + m.count, 0);
  const freqDelta = prevTotal > 0 ? ((recentTotal - prevTotal) / prevTotal * 100).toFixed(0) : '—';
  const freqClass = freqDelta === '—' ? 'flat' : (Number(freqDelta) > 0 ? 'up' : (Number(freqDelta) < 0 ? 'down' : 'flat'));

  document.getElementById('sev-trend-summary').innerHTML = `
    <div class="trend-stat"><div class="val">${recentAvg}</div><div class="label">Avg (3mo)</div></div>
    <div class="trend-stat"><div class="val">${recentTotal}<span class="trend-delta ${freqClass}">${freqDelta !== '—' ? (Number(freqDelta) > 0 ? '+' : '') + freqDelta + '%' : ''}</span></div><div class="label">Last 3mo</div></div>
    <div class="trend-stat"><div class="val">${entries.length}</div><div class="label">All Time</div></div>
  `;

  // Draw grid lines
  const padL = 30, padR = 10, padT = 10, padB = 30;
  const gW = W - padL - padR, gH = H - padT - padB;
  ctx.strokeStyle = 'rgba(255,255,255,.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 10; i += 2) {
    const y = padT + gH - (i / 10) * gH;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + gW, y); ctx.stroke();
  }

  // Draw labels
  ctx.fillStyle = '#6a6a80';
  ctx.font = '9px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 10; i += 5) {
    const y = padT + gH - (i / 10) * gH;
    ctx.fillText(i, padL - 6, y + 3);
  }
  ctx.textAlign = 'center';
  months.forEach((m, i) => {
    const x = padL + (i / (months.length - 1)) * gW;
    ctx.fillText(m.label, x, H - 6);
  });

  // Draw area fill
  const points = months.map((m, i) => ({
    x: padL + (i / (months.length - 1)) * gW,
    y: padT + gH - (m.avg / 10) * gH
  }));

  ctx.beginPath();
  ctx.moveTo(points[0].x, padT + gH);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(points[points.length - 1].x, padT + gH);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, padT, 0, padT + gH);
  grad.addColorStop(0, 'rgba(124,92,252,.25)');
  grad.addColorStop(1, 'rgba(124,92,252,.02)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Draw line
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = '#7c5cfc';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Draw dots
  points.forEach((p, i) => {
    if (months[i].count === 0) return;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = SEV_COLORS[Math.round(months[i].avg) - 1] || '#7c5cfc';
    ctx.fill();
    ctx.strokeStyle = '#0c0c11';
    ctx.lineWidth = 2;
    ctx.stroke();
  });
}

function renderYearHeatmap() {
  const now = new Date();
  const oneYearAgo = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());
  // Build a map of date -> max severity
  const dateMap = {};
  entries.forEach(e => {
    if (!dateMap[e.date] || e.severity > dateMap[e.date]) dateMap[e.date] = e.severity;
  });

  let cells = '';
  const startDay = new Date(oneYearAgo);
  // Align to start of week (Sunday)
  startDay.setDate(startDay.getDate() - startDay.getDay());
  const d = new Date(startDay);
  const monthLabels = new Map();
  while (d <= now) {
    const key = d.toISOString().split('T')[0];
    const sev = dateMap[key] || 0;
    let bg = 'var(--surface2)';
    if (sev >= 1 && sev <= 3) bg = 'rgba(78,168,222,.5)';
    else if (sev >= 4 && sev <= 6) bg = 'rgba(255,209,102,.6)';
    else if (sev >= 7 && sev <= 8) bg = 'rgba(255,140,66,.7)';
    else if (sev >= 9) bg = 'rgba(255,77,106,.8)';
    cells += `<div class="year-heatmap-cell" style="background:${bg}" title="${key}${sev ? ' (severity '+sev+')' : ''}"></div>`;
    // Track month boundaries for labels
    if (d.getDate() <= 7 && d.getDay() === 0) {
      monthLabels.set(Math.floor((d - startDay) / (7 * 86400000)), d.toLocaleDateString('en-US', { month: 'short' }));
    }
    d.setDate(d.getDate() + 1);
  }
  document.getElementById('year-heatmap').innerHTML = cells;

  // Month labels
  const totalWeeks = Math.ceil((now - startDay) / (7 * 86400000));
  let labelsHtml = '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const labelDate = new Date(startDay);
  let lastMonth = -1;
  for (let w = 0; w < totalWeeks; w++) {
    const wd = new Date(startDay);
    wd.setDate(wd.getDate() + w * 7);
    if (wd.getMonth() !== lastMonth) {
      lastMonth = wd.getMonth();
      labelsHtml += `<span>${months[lastMonth]}</span>`;
    }
  }
  document.getElementById('year-heatmap-months').innerHTML = labelsHtml;
}

function renderMonthlyBreakdown() {
  const now = new Date();
  const rows = [];
  let globalMax = 0;
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const me = entries.filter(e => { const ed = new Date(e.date); return ed.getMonth() === d.getMonth() && ed.getFullYear() === d.getFullYear(); });
    const avg = me.length ? (me.reduce((s, e) => s + e.severity, 0) / me.length).toFixed(1) : 0;
    if (me.length > globalMax) globalMax = me.length;
    rows.push({ label: d.toLocaleDateString('en-US', { month: 'short' }), count: me.length, avg });
  }
  const max = Math.max(globalMax, 1);
  document.getElementById('monthly-breakdown').innerHTML = rows.map(r => {
    const pct = (r.count / max) * 100;
    const color = r.avg == 0 ? 'var(--surface3)' : r.avg <= 3 ? 'rgba(78,168,222,.7)' : r.avg <= 6 ? 'rgba(255,209,102,.7)' : r.avg <= 8 ? 'rgba(255,140,66,.7)' : 'rgba(255,77,106,.8)';
    return `<div class="sparkline-row">
      <span class="sparkline-label">${r.label}</span>
      <div class="sparkline-bar-track"><div class="sparkline-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="sparkline-val">${r.count}</span>
    </div>`;
  }).join('');
}

// ---- CARD SORT / REORDER ----
let sortMode = false;
function toggleSortMode() {
  sortMode = !sortMode;
  document.getElementById('sort-toggle').classList.toggle('active', sortMode);
  document.getElementById('dash-sortable').classList.toggle('sort-mode', sortMode);
  if (sortMode) initDragListeners();
  else removeDragListeners();
}

function restoreCardOrder() {
  const saved = JSON.parse(localStorage.getItem('dash-card-order') || 'null');
  if (!saved) return;
  const container = document.getElementById('dash-sortable');
  const cards = [...container.querySelectorAll('.dash-card-wrap')];
  const map = {};
  cards.forEach(c => map[c.dataset.cardId] = c);
  saved.forEach(id => { if (map[id]) container.appendChild(map[id]); });
}

function saveCardOrder() {
  const container = document.getElementById('dash-sortable');
  const order = [...container.querySelectorAll('.dash-card-wrap')].map(c => c.dataset.cardId);
  localStorage.setItem('dash-card-order', JSON.stringify(order));
}

let dragEl = null;
function initDragListeners() {
  const container = document.getElementById('dash-sortable');
  container.querySelectorAll('.drag-handle').forEach(h => {
    h.addEventListener('mousedown', onDragStart);
    h.addEventListener('touchstart', onDragStart, { passive: false });
  });
}
function removeDragListeners() {
  const container = document.getElementById('dash-sortable');
  container.querySelectorAll('.drag-handle').forEach(h => {
    h.removeEventListener('mousedown', onDragStart);
    h.removeEventListener('touchstart', onDragStart);
  });
}

function onDragStart(e) {
  if (!sortMode) return;
  e.preventDefault();
  dragEl = e.target.closest('.dash-card-wrap');
  dragEl.classList.add('dragging');
  const move = e.type === 'touchstart' ? onTouchMove : onMouseMove;
  const end = e.type === 'touchstart' ? onTouchEnd : onMouseEnd;
  document.addEventListener(e.type === 'touchstart' ? 'touchmove' : 'mousemove', move, { passive: false });
  document.addEventListener(e.type === 'touchstart' ? 'touchend' : 'mouseup', end, { once: true });
}

function getCardAtPoint(x, y) {
  const container = document.getElementById('dash-sortable');
  const cards = [...container.querySelectorAll('.dash-card-wrap')];
  for (const c of cards) {
    if (c === dragEl) continue;
    const r = c.getBoundingClientRect();
    if (y >= r.top && y <= r.bottom) return c;
  }
  return null;
}

function clearDragOver() {
  document.querySelectorAll('.dash-card-wrap.drag-over').forEach(c => c.classList.remove('drag-over'));
}

function onMouseMove(e) { handleDragMove(e.clientX, e.clientY); }
function onTouchMove(e) { e.preventDefault(); const t = e.touches[0]; handleDragMove(t.clientX, t.clientY); }

function handleDragMove(x, y) {
  clearDragOver();
  const target = getCardAtPoint(x, y);
  if (target) target.classList.add('drag-over');
}

function onMouseEnd(e) { finishDrag(e.clientX, e.clientY); }
function onTouchEnd(e) { const t = e.changedTouches[0]; finishDrag(t.clientX, t.clientY); }

function finishDrag(x, y) {
  if (!dragEl) return;
  clearDragOver();
  dragEl.classList.remove('dragging');
  const target = getCardAtPoint(x, y);
  if (target && target !== dragEl) {
    const container = document.getElementById('dash-sortable');
    const cards = [...container.querySelectorAll('.dash-card-wrap')];
    const dragIdx = cards.indexOf(dragEl);
    const targetIdx = cards.indexOf(target);
    if (dragIdx < targetIdx) {
      target.after(dragEl);
    } else {
      target.before(dragEl);
    }
    saveCardOrder();
    // Re-render charts that depend on canvas sizing
    renderSeverityTrend();
  }
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('touchmove', onTouchMove);
  dragEl = null;
}

// ---- HISTORY ----
function renderHistory() {
  const list = document.getElementById('history-list');
  if (!entries.length) {
    list.innerHTML = '<div class="empty-state"><p>No entries yet.</p></div>';
    return;
  }
  list.innerHTML = entries.map(e => timelineItem(e, true)).join('');
}

function timelineItem(e, showFull) {
  const [yr, mo, dy] = e.date.split('-').map(Number);
  const [hr, mn] = (e.time || '00:00').split(':').map(Number);
  const d = new Date(yr, mo - 1, dy, hr, mn);
  const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  const color = SEV_COLORS[e.severity - 1];
  const triggers = e.triggers.length ? e.triggers.join(', ') : '';
  const dur = e.duration ? ` · ${e.duration}` : '';
  let expanded = '';
  if (showFull) {
    const parts = [];
    if (e.weather) parts.push(`<strong>Weather:</strong> ${esc(e.weather)}`);
    if (e.medTaken) parts.push(`<strong>Medication:</strong> ${esc(e.medName || 'Yes')}${e.medDose ? ' (' + esc(e.medDose) + ')' : ''}`);
    if (e.notes) parts.push(`<strong>Notes:</strong> ${esc(e.notes)}`);
    expanded = `<div class="tl-expanded">${parts.join('<br>') || 'No additional details'}
      <div class="tl-actions">
        <button class="tl-edit" onclick="event.stopPropagation();showLogForm(entries.find(x=>x.id==='${e.id}'))">Edit</button>
        <button class="tl-del" onclick="event.stopPropagation();showConfirm('Delete this entry?',()=>deleteEntry('${e.id}'))">Delete</button>
      </div>
    </div>`;
  }
  return `<div class="timeline-item" onclick="this.classList.toggle('expanded')">
    <div class="tl-sev" style="background:${color}">${e.severity}</div>
    <div class="tl-info">
      <div class="tl-date">${dateStr} at ${timeStr}${dur}</div>
      ${triggers ? `<div class="tl-triggers">${esc(triggers)}</div>` : ''}
      ${expanded}
    </div>
  </div>`;
}

// ---- MEDS INVENTORY ----
function renderMeds() {

    return `<div class="med-item">
      <div class="med-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent2)" stroke-width="2" stroke-linecap="round"><path d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-6 9h6"/></svg></div>
      <div class="med-info">
        <div class="med-name">${esc(m.name)}</div>
        <div class="med-detail">${m.exp ? (expired ? '<span class="med-expired">Expired ' + m.exp + '</span>' : 'Exp: ' + m.exp) : ''}${m.notes ? (m.exp ? ' · ' : '') + esc(m.notes) : ''}</div>
      </div>
      <div class="med-qty${expired ? ' med-expired' : ''}">${m.qty ?? '—'}</div>
      <div class="med-actions">
        <button onclick="editMed('${m.id}')" title="Edit">✎</button>
        <button onclick="showConfirm('Remove this medication?',()=>deleteMed('${m.id}'))" title="Delete" style="color:var(--red)">✕</button>
      </div>

function showMedModal(med) {
  document.getElementById('med-edit-id').value = med ? med.id : '';
  document.getElementById('med-modal-title').textContent = med ? 'Edit Medication' : 'Add Medication';
  document.getElementById('med-name').value = med ? med.name : '';
  document.getElementById('med-qty').value = med ? (med.qty ?? '') : '';
  document.getElementById('med-exp').value = med ? (med.exp || '') : '';
  document.getElementById('med-notes').value = med ? (med.notes || '') : '';
  document.getElementById('med-modal').classList.add('active');
}

function closeMedModal() { document.getElementById('med-modal').classList.remove('active'); }

function editMed(id) { showMedModal(meds.find(m => m.id === id)); }

function saveMed(e) {
  e.preventDefault();
  const editId = document.getElementById('med-edit-id').value;
  const med = {
    id: editId || crypto.randomUUID(),
    name: document.getElementById('med-name').value.trim(),
    qty: parseInt(document.getElementById('med-qty').value) || 0,
    exp: document.getElementById('med-exp').value,
    notes: document.getElementById('med-notes').value.trim()
  };
  if (editId) {
    const idx = meds.findIndex(m => m.id === editId);
    if (idx >= 0) meds[idx] = med;
  } else {
    meds.push(med);
  }
  persistMeds();
  closeMedModal();
  renderMeds();
  toast(editId ? 'Medication updated' : 'Medication added');
}

function deleteMed(id) {
  meds = meds.filter(m => m.id !== id);
  persistMeds();
  renderMeds();
  toast('Medication removed');
}

// ---- CONFIRM MODAL ----
let confirmCallback = null;
function showConfirm(msg, onConfirm, btnLabel, btnStyle) {
  document.getElementById('confirm-msg').textContent = msg;
  const btn = document.getElementById('confirm-ok-btn');
  btn.textContent = btnLabel || 'Delete';
  btn.style.background = btnStyle === 'accent' ? 'var(--accent)' : '';
  btn.style.boxShadow = btnStyle === 'accent' ? '0 2px 8px rgba(124,92,252,.3)' : '';
  confirmCallback = onConfirm;
  document.getElementById('confirm-modal').classList.add('active');
}
function closeConfirm(ok) {
  document.getElementById('confirm-modal').classList.remove('active');
  if (ok && confirmCallback) confirmCallback();
  confirmCallback = null;
}

// ---- EXPORT / IMPORT ----
function exportData() {
  const data = { entries, meds, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'migraine-log-backup.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Data exported');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data.entries) || !Array.isArray(data.meds)) {
        toast('Invalid backup file');
        return;
      }
      entries = data.entries;
      meds = data.meds;
      persist();
      persistMeds();
      switchView('home');
      toast('Data imported');
    } catch {
      toast('Failed to read file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function importSpreadsheet(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      if (typeof XLSX === 'undefined') { toast('Sheet library not loaded'); return; }
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!rows.length) { toast('No data found in file'); return; }

      // Normalize column headers: lowercase, trim, strip spaces/underscores
      const normalize = s => String(s).toLowerCase().trim().replace(/[\s_-]+/g, '');
      const colMap = (row, ...keys) => {
        for (const k of Object.keys(row)) {
          const nk = normalize(k);
          for (const target of keys) {
            if (nk === normalize(target) || nk.includes(normalize(target))) return row[k];
          }
        }
        return '';
      };

      const imported = [];
      for (const row of rows) {
        // Parse date — handle Date objects, ISO strings, and common formats
        let dateVal = colMap(row, 'date', 'datelogged', 'migrainedate', 'logdate');
        if (dateVal instanceof Date) {
          dateVal = dateVal.toISOString().split('T')[0];
        } else {
          dateVal = String(dateVal).trim();
          // Try to parse MM/DD/YYYY or M/D/YYYY
          const slashMatch = dateVal.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
          if (slashMatch) {
            dateVal = slashMatch[3] + '-' + slashMatch[1].padStart(2,'0') + '-' + slashMatch[2].padStart(2,'0');
          }
        }
        if (!dateVal || !/^\d{4}-\d{2}-\d{2}$/.test(dateVal)) continue; // skip rows without valid date

        let timeVal = colMap(row, 'time', 'onset', 'starttime', 'timeofonset');
        if (timeVal instanceof Date) {
          timeVal = timeVal.toTimeString().slice(0, 5);
        } else {
          timeVal = String(timeVal).trim();
          // Handle 12hr format
          const ampm = timeVal.match(/^(\d{1,2}):?(\d{2})?\s*(am|pm)$/i);
          if (ampm) {
            let h = parseInt(ampm[1]);
            const m = ampm[2] || '00';
            if (ampm[3].toLowerCase() === 'pm' && h < 12) h += 12;
            if (ampm[3].toLowerCase() === 'am' && h === 12) h = 0;
            timeVal = String(h).padStart(2,'0') + ':' + m;
          }
        }
        if (!timeVal || !/^\d{2}:\d{2}/.test(timeVal)) timeVal = '12:00';

        let sev = colMap(row, 'severity', 'pain', 'intensity', 'level', 'painlevel');
        sev = parseInt(sev) || 5;
        if (sev < 1) sev = 1;
        if (sev > 10) sev = 10;

        let dur = String(colMap(row, 'duration', 'length', 'howlong')).trim() || '';

        let trigStr = String(colMap(row, 'triggers', 'trigger', 'cause', 'causes')).trim();
        const trigArr = trigStr ? trigStr.split(/[,;|]+/).map(t => t.trim()).filter(Boolean) : [];

        const weather = String(colMap(row, 'weather', 'conditions')).trim();
        const medTakenRaw = String(colMap(row, 'medtaken', 'medication', 'tookmed', 'medicine', 'med')).trim().toLowerCase();
        const medTaken = ['yes','true','1','y'].includes(medTakenRaw) || !!medTakenRaw && medTakenRaw !== 'no' && medTakenRaw !== 'false' && medTakenRaw !== '0' && medTakenRaw !== 'n' && medTakenRaw !== '';
        const medName = String(colMap(row, 'medname', 'medicinename', 'medicationname', 'drug')).trim();
        const medDose = String(colMap(row, 'meddose', 'dose', 'dosage')).trim();
        const notes = String(colMap(row, 'notes', 'note', 'comments', 'comment', 'description')).trim();

        imported.push({
          id: crypto.randomUUID(),
          date: dateVal,
          time: timeVal.slice(0, 5),
          severity: sev,
          duration: dur,
          triggers: trigArr,
          weather,
          medTaken: medTaken && medName !== '',
          medName,
          medDose,
          notes,
          createdAt: Date.now()
        });
      }

      if (!imported.length) {
        toast('No valid rows found. Need at least a "date" column.');
        return;
      }

      showConfirm(
        'Import ' + imported.length + ' entries from spreadsheet? This will add to your existing data.',
        () => {
          entries = [...imported, ...entries];
          // Sort by date descending
          entries.sort((a, b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time));
          persist();
          switchView('home');
          toast(imported.length + ' entries imported');
        },
        'Import', 'accent'
      );
    } catch (err) {
      toast('Failed to parse file');
      console.error('Spreadsheet import error:', err);
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

// ---- UTILS ----
function persist() { localStorage.setItem('migraine-entries', JSON.stringify(entries)); }
function persistMeds() { localStorage.setItem('migraine-meds', JSON.stringify(meds)); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});

// Close modals on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('confirm-modal').classList.contains('active')) {
      closeConfirm(false);
    } else if (document.getElementById('log-modal').classList.contains('active')) {
      closeLogModal();
    } else if (document.getElementById('med-modal').classList.contains('active')) {
      closeMedModal();
    }
  }
});

init();
</script>
